```html
<!DOCTYPE html>
<html>
<head>
<title>Cake Shop App</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f5f5f5;
overflow-x:hidden;
}

/* LOGIN */

#loginPage{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:#ffe6f2;
}

.loginBox{
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px gray;
text-align:center;
}

input{
padding:10px;
margin:10px;
width:200px;
}

button{
padding:10px;
background:#ff4081;
color:white;
border:none;
cursor:pointer;
border-radius:5px;
}

/* APP */

#appPage{
display:none;
}

.header{
background:#ff4081;
color:white;
padding:15px;
text-align:center;
font-size:22px;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
padding:20px;
}

.card{
background:white;
border-radius:10px;
box-shadow:0 0 8px gray;
text-align:center;
padding:15px;
}

.price{
color:green;
font-weight:bold;
}

.cart{
background:white;
margin:20px;
padding:20px;
border-radius:10px;
box-shadow:0 0 8px gray;
text-align:center;
}

/* CONFETTI */

.confetti{
position:fixed;
top:-10px;
font-size:20px;
animation:fall linear forwards;
}

@keyframes fall{
to{
transform:translateY(100vh);
}
}

</style>

</head>

<body>

<!-- LOGIN PAGE -->

<div id="loginPage">

<div class="loginBox">

<h2>Cake Shop Login</h2>

<input id="username" placeholder="Username"><br>
<input id="password" type="password" placeholder="Password"><br>

<button onclick="login()">Login</button>

<p id="error"></p>

</div>

</div>

<!-- APP -->

<div id="appPage">

<div class="header">
🎂 Cake Shop
</div>

<div class="products">

<div class="card">
<h3>Chocolate Cake</h3>
<p class="price">₹500</p>
<button onclick="addCart('Chocolate Cake',500)">Add to Cart</button>
</div>

<div class="card">
<h3>Strawberry Cake</h3>
<p class="price">₹450</p>
<button onclick="addCart('Strawberry Cake',450)">Add to Cart</button>
</div>

<div class="card">
<h3>Vanilla Cake</h3>
<p class="price">₹400</p>
<button onclick="addCart('Vanilla Cake',400)">Add to Cart</button>
</div>

</div>

<div class="cart">

<h2>Your Cart 🛒</h2>

<div id="cartItems"></div>

<h3 id="total">Total: ₹0</h3>

<button onclick="orderNow()">Place Order</button>

</div>

</div>

<script>

let total=0;

function login(){

let user=document.getElementById("username").value;
let pass=document.getElementById("password").value;

if(user=="admin" && pass=="1234"){

document.getElementById("loginPage").style.display="none";
document.getElementById("appPage").style.display="block";

}
else{

document.getElementById("error").innerHTML="Invalid Login";

}

}

function addCart(name,price){

let cart=document.getElementById("cartItems");

cart.innerHTML+=name+" - ₹"+price+"<br>";

total+=price;

document.getElementById("total").innerHTML="Total: ₹"+total;

}

function orderNow(){

if(total==0){
alert("Please add cake first!");
return;
}

alert("🎉 Order Placed Successfully!");

createConfetti();

}

function createConfetti(){

for(let i=0;i<40;i++){

let conf=document.createElement("div");

conf.innerHTML="🎉";

conf.className="confetti";

conf.style.left=Math.random()*100+"vw";

conf.style.animationDuration=(Math.random()*3+2)+"s";

document.body.appendChild(conf);

setTimeout(()=>{conf.remove();},5000);

}

}

</script>

</body>
</html>
